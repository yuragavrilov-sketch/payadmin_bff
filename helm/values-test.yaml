image:
  repository: harbor.online.tkbbank.ru/tkbpay/payadmin_bff   # must equal CI image path ($IMAGE_REGISTRY/$IMAGE_REGISTRY_PROJECT/$CI_PROJECT_NAME); tag injected by CI
serviceAccount:
  create: true                   # dedicated SA, bound to the Vault k8s-auth role `payadmin-bff`
  name: payadmin-bff
imagePullSecrets:
  enabled: true
  name: test-adapters-ips        # namespace Harbor pull secret (the dedicated SA has none of its own)
vault:
  enabled: false                 # chart's own Vault integration off — the app is the Vault client (Spring Cloud Vault)
replicaCount: 1

# Internal BFF — the SPA's nginx proxies /api to it. No external ingress (front deferred).
ingress:
  enabled: false

ports:
  - containerPort: 8080
service:
  name: payadmin-bff
  port: 8080
  targetPort: 8080

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080
readinessProbe:
  initialDelaySeconds: 20
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080

extraEnvs:
  - name: SPRING_PROFILES_ACTIVE
    value: test
  - name: SERVER_PORT
    value: "8080"                # align with chart container port
  # pay.environment drives the Vault KV contexts (pay/<env>/...) and the Config Server label; it must
  # be an env var because config-data resolves before the active profile is applied (see ADR-0009).
  - name: PAY_ENVIRONMENT
    value: test
  # Enable the external config-data clients (application.yml defaults both to false for standalone).
  - name: VAULT_ENABLED
    value: "true"
  - name: CONFIG_SERVER_ENABLED
    value: "true"
  # --- Vault: application secrets read directly (Spring Cloud Vault, Kubernetes auth) ---
  - name: SPRING_CLOUD_VAULT_URI
    value: "https://vault.online.tkbbank.ru"
  - name: SPRING_CLOUD_VAULT_AUTHENTICATION
    value: "KUBERNETES"
  - name: SPRING_CLOUD_VAULT_KUBERNETES_KUBERNETES_PATH
    value: "payadmin-test"
  - name: SPRING_CLOUD_VAULT_KUBERNETES_ROLE
    value: "payadmin-bff"
  # Shared contour internal-admin-key — single Vault secret pay/test/internal-admin-key (key
  # pay.internal-admin-api-key), mapped into both upstream admin-key properties via placeholder.
  - name: VAULT_KV_CONTEXTS
    value: "test/internal-admin-key"
  # --- Config Server (payconfig-server, Basic auth) ---
  - name: CONFIG_SERVER_URL
    value: "http://payconfig-server:8080"
  - name: CONFIG_CLIENT_USERNAME
    value: "configadmin"
  # Bootstrap credential (ADR-0009): from the SAME k8s Secret/key payconfig-server validates against,
  # so client and server share one source of truth. Present before any config-data import.
  - name: CONFIG_CLIENT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: payconfig-server-secret
        key: CONFIG_SERVER_PASSWORD
  # Non-secret app config (Keycloak issuer, merchants-core / limit-management base URLs,
  # required-authority) comes from Config Server — config-repo branch `test`, file
  # `payadmin-bff/application.yaml`. Not set here (an env var would override Config Server).
  # Application secret read from Vault (see VAULT_KV_CONTEXTS):
  #   pay/test/internal-admin-key  key pay.internal-admin-api-key  (shared contour value)
  # mapped in application.yml into both payadmin-bff.{merchants-core,limit-management}.internal-admin-api-key.
