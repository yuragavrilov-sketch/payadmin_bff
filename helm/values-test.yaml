image:
  repository: harbor.online.tkbbank.ru/tkbpay/payadmin_bff   # TODO: align with CI image path; tag injected by CI
serviceAccount:
  name: test-adapters            # TODO: confirm SA
vault:
  enabled: false
replicaCount: 1

# Internal BFF — the SPA's nginx proxies /api to it. No external ingress.
ingress:
  enabled: false

ports:
  - containerPort: 8080
service:
  name: payadmin-bff
  port: 8080
  targetPort: 8080

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080
readinessProbe:
  initialDelaySeconds: 20
  periodSeconds: 10
  httpGet:
    path: /actuator/health
    port: 8080

extraEnvs:
  - name: SPRING_PROFILES_ACTIVE
    value: test
  - name: SERVER_PORT
    value: "8080"                # align with chart container port
  - name: SPRING_CLOUD_VAULT_ENABLED
    value: "false"               # secrets via k8s Secret instead of Vault
  - name: CONFIG_SERVER_URL
    value: "http://payconfig-server:8080"
  - name: CONFIG_CLIENT_USERNAME
    value: "configadmin"
  - name: KEYCLOAK_ISSUER_URI
    value: "https://keycloak.tkbbank.ru/realms/payadmin"   # TODO: real corp Keycloak issuer
  - name: MERCHANTS_CORE_BASE_URL
    value: "http://merchants-core:8082"                    # TODO: confirm merchants-core deployed
  - name: PAYADMIN_LIMIT_MANAGEMENT_BASE_URL
    value: "http://pay-limit-management:8084"              # TODO: confirm pay-limit-management deployed
  # --- Secrets via pre-created k8s Secret `payadmin-bff-secret` ---
  - name: CONFIG_CLIENT_PASSWORD
    valueFrom:
      secretKeyRef:
        name: payadmin-bff-secret
        key: CONFIG_CLIENT_PASSWORD
  - name: MERCHANTS_CORE_INTERNAL_ADMIN_API_KEY
    valueFrom:
      secretKeyRef:
        name: payadmin-bff-secret
        key: MERCHANTS_CORE_INTERNAL_ADMIN_API_KEY
  - name: PAYADMIN_LIMIT_MANAGEMENT_INTERNAL_ADMIN_API_KEY
    valueFrom:
      secretKeyRef:
        name: payadmin-bff-secret
        key: PAYADMIN_LIMIT_MANAGEMENT_INTERNAL_ADMIN_API_KEY
