server:
  port: ${SERVER_PORT:8083}

pay:
  environment: ${PAY_ENVIRONMENT:local}

spring:
  application:
    name: payadmin-bff
  profiles:
    default: local
  config:
    import:
      - optional:configserver:${CONFIG_SERVER_URL:http://pay-payconfig-server:8080}
      - optional:vault://
  cloud:
    config:
      enabled: ${CONFIG_SERVER_ENABLED:false}
      label: ${CONFIG_SERVER_LABEL:${pay.environment}}
      username: ${CONFIG_CLIENT_USERNAME:}
      password: ${CONFIG_CLIENT_PASSWORD:}
    vault:
      enabled: ${VAULT_ENABLED:false}
      kv:
        backend: ${VAULT_KV_BACKEND:pay}
        default-context: ""
        application-name: ${VAULT_KV_CONTEXTS:${pay.environment}/sbp-router-admin-key}
        profiles: []
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/payadmin}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

payadmin-bff:
  pay-limit-projection:
    base-url: ${PAY_LIMIT_PROJECTION_BASE_URL:http://localhost:8088}
    internal-admin-header-name: ${PAY_LIMIT_PROJECTION_INTERNAL_ADMIN_HEADER_NAME:X-Internal-Admin-Key}
    internal-admin-api-key: ${sbp-router.admin-key:${PAY_LIMIT_PROJECTION_INTERNAL_ADMIN_API_KEY:}}
    connect-timeout: ${PAY_LIMIT_PROJECTION_CONNECT_TIMEOUT:2s}
    read-timeout: ${PAY_LIMIT_PROJECTION_READ_TIMEOUT:5s}
  limit-management:
    base-url: ${PAYADMIN_LIMIT_MANAGEMENT_BASE_URL:http://localhost:8084}
    internal-admin-header-name: ${PAYADMIN_LIMIT_MANAGEMENT_INTERNAL_ADMIN_HEADER_NAME:X-Internal-Admin-Key}
    internal-admin-api-key: ${sbp-router.admin-key:${PAYADMIN_LIMIT_MANAGEMENT_INTERNAL_ADMIN_API_KEY:}}
    connect-timeout: ${PAYADMIN_LIMIT_MANAGEMENT_CONNECT_TIMEOUT:2s}
    read-timeout: ${PAYADMIN_LIMIT_MANAGEMENT_READ_TIMEOUT:5s}
  merchants-core:
    base-url: ${MERCHANTS_CORE_BASE_URL:http://localhost:8082}
    internal-admin-header-name: ${MERCHANTS_CORE_INTERNAL_ADMIN_HEADER:X-Internal-Admin-Key}
    internal-admin-api-key: ${sbp-router.admin-key:${MERCHANTS_CORE_INTERNAL_ADMIN_API_KEY:}}
    connect-timeout: ${MERCHANTS_CORE_CONNECT_TIMEOUT:2s}
    read-timeout: ${MERCHANTS_CORE_READ_TIMEOUT:5s}
    page-size: ${MERCHANTS_CORE_PAGE_SIZE:500}
    max-pages: ${MERCHANTS_CORE_MAX_PAGES:20}
  sbp-router-management:
    base-url: ${SBP_ROUTER_MANAGEMENT_BASE_URL:http://localhost:8087}
    internal-admin-header-name: ${SBP_ROUTER_MANAGEMENT_INTERNAL_ADMIN_HEADER:X-Internal-Admin-Key}
    internal-admin-api-key: ${sbp-router.admin-key:${SBP_ROUTER_MANAGEMENT_INTERNAL_ADMIN_API_KEY:}}
    connect-timeout: ${SBP_ROUTER_MANAGEMENT_CONNECT_TIMEOUT:2s}
    read-timeout: ${SBP_ROUTER_MANAGEMENT_READ_TIMEOUT:5s}
  transgran-engine:
    base-url: ${TRANSGRAN_ENGINE_BASE_URL:http://localhost:8089}
    internal-admin-header-name: ${TRANSGRAN_ENGINE_INTERNAL_ADMIN_HEADER:X-Internal-Admin-Key}
    internal-admin-api-key: ${transgran-engine.internal-key:${TRANSGRAN_ENGINE_INTERNAL_ADMIN_API_KEY:}}
    connect-timeout: ${TRANSGRAN_ENGINE_CONNECT_TIMEOUT:2s}
    read-timeout: ${TRANSGRAN_ENGINE_READ_TIMEOUT:5s}
  merchants:
    unknown-mcc: ${PAYADMIN_UNKNOWN_MCC:0000}
  security:
    required-authority: ${PAYADMIN_REQUIRED_AUTHORITY:}
